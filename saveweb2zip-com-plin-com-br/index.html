  <body>
    <div id="root"></div>
    <script defer src="js/quiz.js" charset="utf-8"></script>

    <script>
      // Corrector de rutas de imágenes (después de que React cargue)
      function fixImagePaths() {
        const images = document.querySelectorAll('img');
        images.forEach(img => {
          let src = img.src || img.getAttribute('src');

          if (!src) return;

          // Si la ruta no empieza con / o http, agregar /images/
          if (!src.startsWith('/') && !src.startsWith('http')) {
            img.src = '/images/' + src;
            img.onerror = function() {
              // Si falla, intentar con rutas alternativas
              this.src = 'images/' + src.split('/').pop();
            };
          }
        });
      }

      // Ejecutar cuando el DOM cargue
      document.addEventListener('DOMContentLoaded', fixImagePaths);
      // Y también después de un delay para React
      setTimeout(fixImagePaths, 500);
      setTimeout(fixImagePaths, 2000);
    </script>
